<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llanterama Hidalguense - Control Maestro 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        :root {
            --primary: #003399; 
            --secondary: #ffcc00; 
            --accent: #25D366;
            --established: #fff9db;
            --established-border: #f39c12;
            --bg: #f4f7f9;
            --white: #ffffff;
            --text: #333333;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        nav {
            background: var(--white); padding: 12px 5%; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }
        .dynamic-title {
            font-size: 22px; font-weight: 900; text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; margin: 0;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .container { width: 95%; max-width: 1400px; margin: 20px auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .btn-back { background: #e2e8f0; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--primary); margin-bottom: 15px; }

        /* ACCIONES PRINCIPALES */
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .action-btn { background: var(--white); padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; border: 2px solid #eee; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .action-btn:hover { border-color: var(--primary); transform: translateY(-5px); }
        .btn-label { background: var(--primary); color: white; padding: 8px 20px; border-radius: 50px; margin-top: 15px; font-weight: bold; font-size: 12px; }

        /* TABLAS Y FILTROS */
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; }
        .filter-row select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 130px; }
        
        .table-container { background: white; padding: 10px; border-radius: 15px; overflow-x: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        th { background: #f8f9fa; color: var(--primary); padding: 12px; text-align: left; cursor: pointer; border-bottom: 3px solid var(--secondary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .row-established { background-color: var(--established) !important; border-left: 6px solid var(--established-border); }
        .badge-status { padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; color: white; text-transform: uppercase; }

        /* MAPA */
        .map-layout { display: flex; gap: 15px; height: 70vh; }
        #map { flex: 1; border-radius: 15px; border: 1px solid #ddd; z-index: 1; }
        .map-sidebar { width: 350px; background: white; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 700px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 30px; cursor: pointer; }
        .img-preview { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; background: #eee; }

        /* INDICADORES */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; text-align: center; }
        .chart-container { position: relative; height: 220px; }
        .tire-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; text-align: center; flex: 1; }
        .tire-box span { display: block; font-size: 22px; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div class="dynamic-title">Llanterama Hidalguense</div>
        <div style="font-size: 11px; font-weight: 800; color: var(--primary);">CONTROL MAESTRO 2026</div>
    </nav>

    <div class="container">
        <div id="home" class="view-section active">
            <div class="action-grid">
                <div class="action-btn" onclick="showView('stats-view')">
                    <div style="font-size: 40px;">📊</div>
                    <h3>Estadísticas</h3>
                    <div class="btn-label">DASHBOARD</div>
                </div>
                <div class="action-btn" onclick="showView('lista')">
                    <div style="font-size: 40px;">📋</div>
                    <h3>Prospectos</h3>
                    <div class="btn-label">LISTADO</div>
                </div>
                <div class="action-btn" onclick="showView('mapa-view')">
                    <div style="font-size: 40px;">📍</div>
                    <h3>Ubicaciones</h3>
                    <div class="btn-label">MAPA</div>
                </div>
                <div class="action-btn" onclick="showView('ventas-view')">
                    <div style="font-size: 40px;">🛞</div>
                    <h3>Ventas</h3>
                    <div class="btn-label">CONTROL VTA</div>
                </div>
            </div>
        </div>

        <div id="lista" class="view-section">
            <button class="btn-back" onclick="showView('home')">← VOLVER</button>
            <div class="filter-row" id="filters-lista"></div>
            <div class="table-container">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Vendedor</th>
                            <th>Negocio</th>
                            <th>Giro</th>
                            <th>Zona</th>
                            <th>Interés</th>
                            <th>WA</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="ventas-view" class="view-section">
            <button class="btn-back" onclick="showView('home')">← VOLVER</button>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                <div class="tire-box"><label>Abril</label><span id="vSum-abr">0</span></div>
                <div class="tire-box"><label>Mayo</label><span id="vSum-may">0</span></div>
                <div class="tire-box" style="background:var(--primary); color:white;"><label>Total</label><span id="vSum-total" style="color:white">0</span></div>
            </div>
            <div class="filter-row" id="filters-ventas"></div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Negocio</th>
                            <th>Vendedor</th>
                            <th>Estado</th>
                            <th style="background:#fff3e0">Abril</th>
                            <th style="background:#e1f5fe">Mayo</th>
                        </tr>
                    </thead>
                    <tbody id="vtaTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="mapa-view" class="view-section">
            <button class="btn-back" onclick="showView('home')">← VOLVER</button>
            <div class="map-layout">
                <div id="map"></div>
                <div class="map-sidebar">
                    <div style="padding:10px; border-bottom:1px solid #eee;" id="filters-map"></div>
                    <div id="mapList" style="overflow-y:auto; flex:1;"></div>
                </div>
            </div>
        </div>

        <div id="stats-view" class="view-section">
            <button class="btn-back" onclick="showView('home')">← VOLVER</button>
            <div class="stats-grid">
                <div class="chart-card"><h4>Efectividad</h4><div class="chart-container"><canvas id="c-conv"></canvas></div></div>
                <div class="chart-card"><h4>Impulsores</h4><div class="chart-container"><canvas id="c-vend"></canvas></div></div>
                <div class="chart-card"><h4>Zonas</h4><div class="chart-container"><canvas id="c-zon"></canvas></div></div>
                <div class="chart-card"><h4>Giros</h4><div class="chart-container"><canvas id="c-gir"></canvas></div></div>
            </div>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content"><span class="close-btn" onclick="closeModal()">×</span><div id="modal-data"></div></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQaNDGlyxQDLjTr_zSuJ0wlc9NZNaFpg6sfU2SNjyxyXHuttqPTSQGlQISm8A3avEyD-b7iRbdD8nxb/pub?gid=1161733578&single=true&output=csv';
        let globalData = [], markersArray = [], colorMap = {}, charts = [];
        let map;
        const palette = ['#003399', '#f39c12', '#25D366', '#e91e63', '#9c27b0', '#00bcd4', '#ff5722', '#607d8b'];

        function showView(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'mapa-view' && map) setTimeout(() => map.invalidateSize(), 300);
        }

        function closeModal() { document.getElementById('clientModal').style.display = "none"; }

        function parseCoords(i) { 
            if(!i) return null; 
            let m = i.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/); 
            return m ? [parseFloat(m[1]), parseFloat(m[2])] : null; 
        }

        function getImg(u) { 
            if(!u || u.length < 10) return ''; 
            if (u.includes('drive.google.com')) {
                let id = u.includes('id=') ? u.split('id=')[1].split('&')[0] : u.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
            }
            return u; 
        }

        // MAPA INICIAL
        map = L.map('map').setView([20.0842, -98.3672], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // CARGA DE DATOS
        Papa.parse(csvUrl, {
            download: true, header: false,
            complete: function(results) {
                globalData = results.data.slice(1).filter(r => r[4] && r[4].trim() !== "");
                processAll();
            }
        });

        function processAll() {
            const vSet = new Set(), zSet = new Set(), gSet = new Set();
            let st = { vend: {}, zon: {}, gir: {}, est: 0 };

            globalData.forEach(r => {
                const v = r[1], z = r[3], g = r[5], isE = r[21] && r[21].toLowerCase().includes("establecido");
                if(v && !colorMap[v]) colorMap[v] = palette[Object.keys(colorMap).length % palette.length];
                if(v) vSet.add(v); if(z) zSet.add(z); if(g) gSet.add(g);
                st.vend[v] = (st.vend[v]||0)+1; st.zon[z] = (st.zon[z]||0)+1; st.gir[g] = (st.gir[g]||0)+1;
                if(isE) st.est++;
            });

            const filterTpl = (id) => `
                <select id="${id}-v" onchange="runFilter('${id}')"><option value="">👤 Vendedor</option>${Array.from(vSet).sort().map(x=>`<option value="${x}">${x}</option>`).join('')}</select>
                <select id="${id}-z" onchange="runFilter('${id}')"><option value="">📍 Zona</option>${Array.from(zSet).sort().map(x=>`<option value="${x}">${x}</option>`).join('')}</select>
            `;
            document.getElementById('filters-lista').innerHTML = filterTpl('l');
            document.getElementById('filters-ventas').innerHTML = filterTpl('v');
            document.getElementById('filters-map').innerHTML = filterTpl('m');

            renderTable(globalData);
            renderVentas(globalData);
            renderMap(globalData);
            initCharts(st);
        }

        function renderTable(data) {
            const b = document.getElementById('tableBody'); b.innerHTML = '';
            data.forEach(r => {
                const isE = r[21] && r[21].toLowerCase().includes("establecido");
                const tr = document.createElement('tr');
                if(isE) tr.className = 'row-established';
                tr.onclick = () => openModal(r);
                tr.innerHTML = `<td>${r[0]}</td><td style="color:${colorMap[r[1]]}; font-weight:800;">${r[1]}</td><td><b>${r[4]}</b></td><td>${r[5]}</td><td>${r[3]}</td><td>${r[12]}</td><td><a href="https://wa.me/52${r[8].replace(/\D/g,'')}" target="_blank" style="color:green; font-weight:bold;">WA</a></td>`;
                b.appendChild(tr);
            });
        }

        function renderVentas(data) {
            const b = document.getElementById('vtaTableBody'); b.innerHTML = '';
            let sA = 0, sM = 0;
            data.forEach(r => {
                const isE = r[21] && r[21].toLowerCase().includes("establecido");
                const a = parseFloat(r[23])||0, m = parseFloat(r[25])||0;
                sA += a; sM += m;
                const tr = document.createElement('tr');
                if(isE) tr.className = 'row-established';
                tr.onclick = () => openModal(r);
                tr.innerHTML = `<td>${r[22]||'-'}</td><td>${r[4]}</td><td style="color:${colorMap[r[1]]}; font-weight:bold;">${r[1]}</td><td>${isE?'CLIENTE':'PROSP.'}</td><td style="text-align:center;">${a}</td><td style="text-align:center;">${m}</td>`;
                b.appendChild(tr);
            });
            document.getElementById('vSum-abr').innerText = sA;
            document.getElementById('vSum-may').innerText = sM;
            document.getElementById('vSum-total').innerText = sA + sM;
        }

        function renderMap(data) {
            const l = document.getElementById('mapList'); l.innerHTML = '';
            markersArray.forEach(m => map.removeLayer(m)); markersArray = [];
            data.forEach(r => {
                const c = parseCoords(r[10]), isE = r[21] && r[21].toLowerCase().includes("establecido");
                if(c) {
                    const m = L.circleMarker(c, { radius: 10, fillColor: colorMap[r[1]], color: isE ? '#f39c12' : '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map);
                    m.on('click', () => openModal(r)); markersArray.push(m);
                }
                const d = document.createElement('div');
                d.style = `padding:10px; border-bottom:1px solid #eee; cursor:pointer; font-size:12px; ${isE?'background:#fff9db':''}`;
                d.innerHTML = `<b>${r[4]}</b><br><span style="color:${colorMap[r[1]]}; font-weight:bold;">● ${r[1]}</span>`;
                d.onclick = () => { if(c) map.setView(c, 16); openModal(r); };
                l.appendChild(d);
            });
        }

        function runFilter(p) {
            const v = document.getElementById(p+'-v').value;
            const z = document.getElementById(p+'-z').value;
            const filtered = globalData.filter(r => (!v || r[1] === v) && (!z || r[3] === z));
            if(p === 'l') renderTable(filtered);
            if(p === 'v') renderVentas(filtered);
            if(p === 'm') renderMap(filtered);
        }

        function openModal(r) {
            const isE = r[21] && r[21].toLowerCase().includes("establecido");
            let vis = ''; [16,17,18,19,20].forEach((idx, i) => { if(r[idx] && r[idx].trim()!=='') vis += `<div><b>V${i+1}:</b> ${r[idx]}</div>`; });
            document.getElementById('modal-data').innerHTML = `
                <img src="${getImg(r[14]) || 'https://via.placeholder.com/400x200'}" class="img-preview">
                <h2>${r[4]}</h2>
                <p><b>Vendedor:</b> <span style="color:${colorMap[r[1]]}; font-weight:800;">${r[1]}</span></p>
                <p><b>Zona:</b> ${r[3]} | <b>Giro:</b> ${r[5]}</p>
                <hr>
                <h4>Seguimiento</h4>${vis || 'Sin visitas'}
                <div style="margin-top:20px;">
                    <a href="https://wa.me/52${r[8].replace(/\D/g,'')}" target="_blank" style="padding:10px; background:green; color:white; border-radius:8px; text-decoration:none;">WHATSAPP</a>
                </div>
            `;
            document.getElementById('clientModal').style.display = "block";
        }

        function initCharts(st) {
            charts.forEach(c => c.destroy());
            const cfg = (ctx, labels, data, colors) => new Chart(ctx, {
                type: 'pie',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            charts.push(cfg(document.getElementById('c-conv'), ['Cliente', 'Prospecto'], [st.est, globalData.length - st.est], ['#f39c12', '#ddd']));
            charts.push(cfg(document.getElementById('c-vend'), Object.keys(st.vend), Object.values(st.vend), Object.keys(st.vend).map(v => colorMap[v])));
            charts.push(cfg(document.getElementById('c-zon'), Object.keys(st.zon), Object.values(st.zon), palette));
            charts.push(cfg(document.getElementById('c-gir'), Object.keys(st.gir), Object.values(st.gir), palette));
        }
    </script>
</body>
</html>
